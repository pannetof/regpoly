# dSFMT (Saito 2009) standard parameter catalog.
#
# Sources:
#   - All params from dSMFT/dSFMT-paramsNNN.h (the standalone
#     dSFMT 2.2.5 distribution shipped under /regpoly/dSMFT/).
#
# Schema: see docs/library/README.md.
# Tested against MTToolBox/samples/dSFMTdc/calc_equidist.
#
# CLI: mexp,pos1,sl1,msk1,msk2,fix1,fix2,parity1,parity2  (all uint64 hex)
#
# Cross-check status: gen_dsfmt's lung-carry recursion + 2-lane 52-bit
# output match dSMFT/dSFMT-common.h line-for-line.  d(1..5) matches
# MTToolBox exactly for mexps 521, 1279, 2203, 4253, 19937.  mexp=11213
# differs from MTToolBox by 2 at v=1 (regpoly k(1)=11211 vs MTToolBox
# 11209) — same notprimitive-subspace-selection issue that affects a
# subset of RMT64 entries.  v=2..5 match for all mexps.

family: dSFMT
mttoolbox_binary: dSFMTdc/calc_equidist
slow_threshold_mexp: 20000

generators:
  - id: dsfmt521
    mexp: 521
    regpoly:
      pos1: 3
      sl1: 25
      msk1: 0x000fbfefff77efff
      msk2: 0x000ffeebfbdfbfdf
      fix1: 0xcfb393d661638469
      fix2: 0xc166867883ae2adb
      pcv1: 0xccaa588000000000
