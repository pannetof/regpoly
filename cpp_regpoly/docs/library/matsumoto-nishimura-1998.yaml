            eta: 7
            mu: 15
            u: 11
            l: 17
            b: 0x655E5280
            c: 0xFFD58000
    notes: |
      Smaller Mersenne Twister variant with period $2^{11213}-1$;
      `k = w \cdot n - r = 32 \cdot 351 - 19 = 11213`.

