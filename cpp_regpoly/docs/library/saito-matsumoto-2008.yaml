id: saito-matsumoto-2008
authors:
  - {family: Saito, given: Mutsuo}
  - {family: Matsumoto, given: Makoto}
year: 2008
title: "SIMD-oriented Fast Mersenne Twister: a 128-bit Pseudorandom Number Generator"
venue: "Monte Carlo and Quasi-Monte Carlo Methods 2006 (Springer)"
pages: "607–622"
doi: https://doi.org/10.1007/978-3-540-74496-2_36
bibkey: SaitoMatsumoto2008
starred: true
tags: [MT, SFMT, 128bit]

abstract: |
  Parameters of a 128-bit pseudorandom number generator named SFMT
  (SIMD-oriented Fast Mersenne Twister) are reported.  It is a Mersenne
  Twister variant using a 128-bit integer recursion, designed to
  exploit the 128-bit SIMD operations available on modern CPUs.  The
  generator has a period of $2^{\text{MEXP}} - 1$ where MEXP is a
  Mersenne exponent; tabulated parametrisations cover MEXP from 607
  up to 216091.

notes: |
  SFMT uses a 128-bit word and a state of $N = \lceil (\text{MEXP} +
  128) / 128 \rceil$ words.  The recurrence (Algorithm 1 of the
  paper) combines a 128-bit-wide left byte-shift by SL2, a
  128-bit-wide right byte-shift by SR2, per-32-bit-lane shifts SL1
  and SR1, and a 128-bit lane-wise mask (MSK1, MSK2, MSK3, MSK4).

  Output of our `next()` is one 128-bit word (produced by one
  `do_recursion`); the Combinaison pipeline consumes the first `L`
  bits of it.

  The reference `period_certification` step from the paper is not
  replicated here: regpoly's combined-generator pipeline seeds the
  state to a non-degenerate bit pattern via `Combinaison.reset()`,
  which takes the state out of any degenerate subspace before the
  first `next()`.

