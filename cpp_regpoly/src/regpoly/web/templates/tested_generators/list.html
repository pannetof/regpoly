{% extends "base.html" %}

{% block title %}Combined generators{% endblock %}

{% block content %}
<hgroup>
    <h1>Combined generators</h1>
    <p>Generators that passed a combined generator search.  Trace them
        back to the search run that found them.</p>
</hgroup>

<div x-data="testedBrowser()" x-init="init()">
    <template x-if="familyLocked">
        <p>
            <mark class="filter-pill">
                Family: <strong x-text="filter.family"></strong>
                <a href="/tested-generators" title="Clear family filter">×</a>
            </mark>
        </p>
    </template>

    <form @submit.prevent="reload()" class="grid">
        <label x-show="!familyLocked">Family
            <select x-model="filter.family" @change="reload()">
                <option value="">(any)</option>
                <template x-for="f in families" :key="f.name">
                    <option :value="f.name" x-text="f.name"></option>
                </template>
            </select>
        </label>
        <label>Test type
            <select x-model="filter.test_type" @change="reload()">
                <option value="">(any)</option>
                <option value="equidistribution">equidistribution</option>
                <option value="collision_free">collision_free</option>
                <option value="tuplets">tuplets</option>
            </select>
        </label>
        <label>Max se
            <input type="number" x-model.number="filter.max_se" @change="reload()">
        </label>
        <label><input type="checkbox" x-model="filter.is_me" @change="reload()">
            ME only
        </label>
    </form>

    <p><span x-text="total"></span> result(s).</p>

    <table class="compact">
        <thead>
            <tr>
                <template x-for="col in columns" :key="col">
                    <th class="sortable"
                        :class="sort.key === col ? 'active' : ''"
                        @click="clickSort(col)">
                        <span x-text="colLabel(col)"></span>
                        <span class="sort-arrow" x-text="sortArrow(col)"></span>
                        <button type="button" class="filter-btn"
                                :class="filterActive(col) ? 'active' : ''"
                                @click.stop="toggleFilter(col, $event)"
                                title="Filter">▾</button>
                    </th>
                </template>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <template x-for="tg in displayRows()" :key="tg.id">
                <tr>
                    <td x-text="tg.id"></td>
                    <td x-text="tg.J"></td>
                    <td x-text="tg.k_g"></td>
                    <td x-text="tg.components.map(c => c.family).join(' + ')"></td>
                    <td x-text="se(tg) ?? '—'"></td>
                    <td x-text="isMe(tg) ? '✓' : ''"></td>
                    <td>
                        <template x-if="tg.search_run_id">
                            <a :href="'/tempering-search/' + tg.search_run_id"
                               x-text="'#' + tg.search_run_id"></a>
                        </template>
                    </td>
                    <td><a :href="'/tested-generators/' + tg.id"
                           target="_top">view</a></td>
                </tr>
            </template>
        </tbody>
    </table>

    <nav>
        <button @click="prev()" :disabled="page <= 1">Prev</button>
        <button @click="next()" :disabled="page * 50 >= total">Next</button>
    </nav>

    <!-- Shared popover for whichever column's filter button is open.
         Kept outside the thead x-for to avoid nested templates. -->
    <div class="filter-popover"
         x-show="openFilter"
         :style="filterPopoverStyle()"
         @click.stop
         @click.away="openFilter = null">
        <template x-if="openFilter">
            <div>
                <label class="filter-all">
                    <input type="checkbox"
                           :checked="allChecked(openFilter)"
                           @change="toggleAll(openFilter)">
                    (Select all)
                </label>
                <template x-for="d in filterDistinctDisplay(openFilter)"
                          :key="d.value">
                    <label>
                        <input type="checkbox"
                               :checked="isChecked(openFilter, d.value)"
                               @change="toggleOne(openFilter, d.value)">
                        <span class="filter-val"
                              x-text="displayLabel(openFilter, d)"></span>
                    </label>
                </template>
            </div>
        </template>
    </div>
</div>

<script>
function testedBrowser() {
    return {
        ...rngTableFilterMethods(),

        families: [], items: [], total: 0, page: 1,
        familyLocked: false,
        filter: { family: '', test_type: '', max_se: null, is_me: false },
        sort: { key: null, dir: null },
        colFilters: {},

        columns: ['id','J','k_g','families','se','is_me','search'],

        colLabel(col) {
            return { id:'ID', J:'J', k_g:'k_g', families:'Families',
                     se:'se', is_me:'ME?', search:'Search' }[col] || col;
        },
        _rowValue(tg, col) {
            if (col === 'families') return tg.components.map(c => c.family).join(' + ');
            if (col === 'se')       return this.se(tg);
            if (col === 'is_me')    return this.isMe(tg) ? 1 : 0;
            if (col === 'search')   return tg.search_run_id;
            return tg[col];
        },
        displayLabel(col, d) {
            if (col === 'is_me') return d.value === '1' ? '✓' : '(no)';
            if (d.value === '') return '(empty)';
            return d.value;
        },

        // Required by rngTableFilterMethods().
        rowsForFilter() { return this.items; },
        rowValue(r, key) { return this._rowValue(r, key); },

        displayRows() {
            return rngTableApply(this.items, this.sort, this.colFilters,
                                 (r, k) => this._rowValue(r, k));
        },
        clickSort(key) { this.sort = rngTableToggleSort(this.sort, key); },
        sortArrow(key)  { return rngTableSortArrow(this.sort, key); },
        async init() {
            const r = await fetch('/api/families');
            this.families = await r.json();
            const qs = new URLSearchParams(window.location.search);
            if (qs.has('family')) {
                this.filter.family = qs.get('family');
                this.familyLocked = true;
            }
            this.reload();
        },
        se(tg) {
            const r = tg.results.find(x => x.test_type === 'equidistribution');
            return r ? r.se : null;
        },
        isMe(tg) {
            const r = tg.results.find(x => x.test_type === 'equidistribution');
            return r && r.is_me;
        },
        async reload() {
            const qs = new URLSearchParams();
            qs.set('page', this.page);
            qs.set('per_page', 50);
            if (this.filter.family)    qs.set('family', this.filter.family);
            if (this.filter.test_type) qs.set('test_type', this.filter.test_type);
            if (this.filter.max_se)    qs.set('max_se', this.filter.max_se);
            if (this.filter.is_me)     qs.set('is_me', 'true');
            const r = await fetch('/api/tested-generators?' + qs.toString());
            const data = await r.json();
            this.items = data.items;
            this.total = data.total;
        },
        prev() { if (this.page > 1) { this.page--; this.reload(); } },
        next() { this.page++; this.reload(); },
    };
}
</script>
{% endblock %}
