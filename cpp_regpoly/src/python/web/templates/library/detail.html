{% extends "base.html" %}

{% block title %}{{ gen_id }} ({{ paper_id }}){% endblock %}

{% block content %}
<div x-data='generatorDetail("{{ paper_id }}", "{{ gen_id }}")'
     x-init="load()">
    <template x-if="!entry">
        <p><em>Loading…</em></p>
    </template>

    <template x-if="entry">
        <div>
            <p>
                <a :href="'/library/' + entry.paper.id">
                    ← <span x-text="entry.paper.display"></span>
                </a>
            </p>

            <hgroup>
                <h1>
                    <span x-text="entry.display"></span>
                    <template x-if="entry.starred">
                        <span title="Featured generator">★</span>
                    </template>
                </h1>
                <p>
                    Family <strong x-text="entry.family"></strong>
                    · J=<span x-text="entry.J"></span>
                    · Lmax=<span x-text="entry.Lmax"></span>
                </p>
            </hgroup>

            <template x-if="entry.errors && entry.errors.length">
                <article style="border-color:#c92a2a">
                    <header><strong>Validation errors</strong></header>
                    <ul>
                        <template x-for="err in entry.errors" :key="err">
                            <li x-text="err"></li>
                        </template>
                    </ul>
                </article>
            </template>

            <!-- Components + tempering -->
            <h3>Components (<span x-text="entry.components.length"></span>)</h3>
            <template x-for="(c, ci) in entry.components" :key="ci">
                <article>
                    <header>
                        <strong>Component <span x-text="ci + 1"></span>:</strong>
                        <span x-text="c.family"></span>
                        · L=<span x-text="c.L"></span>
                    </header>
                    <table class="compact">
                        <thead>
                            <tr><th>Parameter</th><th>Value</th></tr>
                        </thead>
                        <tbody>
                            <template x-for="[k, v] in Object.entries(c.params)" :key="k">
                                <tr>
                                    <td class="mono" x-text="k"></td>
                                    <td class="mono"
                                        x-text="formatParam(v)"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <template x-if="c.tempering && c.tempering.length">
                        <details open>
                            <summary>Tempering chain
                                (<span x-text="c.tempering.length"></span>
                                transform<span
                                    x-show="c.tempering.length !== 1">s</span>)
                            </summary>
                            <template x-for="(t, ti) in c.tempering" :key="ti">
                                <article>
                                    <header>
                                        <strong x-text="(ti + 1) + '. ' + t.type"></strong>
                                    </header>
                                    <table class="compact">
                                        <tbody>
                                            <template x-for="[k, v] in Object.entries(t).filter(([k]) => k !== 'type')" :key="k">
                                                <tr>
                                                    <td class="mono" x-text="k"></td>
                                                    <td class="mono"
                                                        x-text="formatParam(v)"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </article>
                            </template>
                        </details>
                    </template>
                    <template x-if="!c.tempering || !c.tempering.length">
                        <p><small><em>No tempering on this component.</em></small></p>
                    </template>
                </article>
            </template>

            <h3>Actions</h3>
            <article>
                <div role="group">
                    <button type="button"
                            @click="instantiate()"
                            :disabled="busy || instantiatedLink()">
                        <span x-text="instantiatedLink()
                            ? 'Already in database'
                            : (busy ? 'Working…' : 'Create in database')"></span>
                    </button>

                    <label style="margin-left: 0.75rem">
                        Equidistribution method
                        <select x-model="method"
                                @change="onMethodChange()"
                                style="min-width: 18rem">
                            <option value="matricial">matricial — Gaussian elimination</option>
                            <option value="lattice">lattice — Couture–L'Ecuyer–Tezuka dual lattice</option>
                            <option value="harase">harase — primal lattice (full-period only)</option>
                            <option value="notprimitive">notprimitive — Berlekamp–Massey on subspace</option>
                            <option value="simd_notprimitive">simd_notprimitive — SFMT/dSFMT/MTGP</option>
                        </select>
                    </label>
                    <button type="button" class="secondary"
                            @click="runTest()"
                            :disabled="busy || methodBlocked()"
                            :title="methodBlocked()
                                ? 'harase does not terminate on this '
                                  + 'generator (reducible χ); pick '
                                  + 'simd_notprimitive or lattice'
                                : ''">
                        <span x-text="busy ? 'Running…' : 'Run test'"></span>
                    </button>
                </div>

                <template x-if="methodBlocked()">
                    <article style="margin-top: 0.75rem;
                                    border-color: #c92a2a;
                                    background: #fff5f5">
                        <header><strong>harase is disabled for this
                            generator</strong></header>
                        <p>The primal-lattice search does not terminate
                            on a reducible characteristic polynomial,
                            which is the case here. Pick
                            <code x-text="recommendedMethod()"></code>
                            instead.</p>
                    </article>
                </template>
                <template x-if="!methodBlocked() && methodWarning()">
                    <article style="margin-top: 0.75rem;
                                    border-color: #f08c00;
                                    background: #fff4e6">
                        <header><strong>Warning</strong></header>
                        <p x-text="methodWarning()"></p>
                        <p><small>Recommended for this generator:
                            <code x-text="recommendedMethod()"></code>.</small></p>
                    </article>
                </template>

                <template x-if="instantiatedLink()">
                    <p style="margin-top: 0.75rem">
                        <span class="status-pill status-completed">In database</span>
                        <a :href="instantiatedLink()" target="_top">
                            View the stored generator →
                        </a>
                    </p>
                </template>

                <template x-if="lastResult">
                    <p style="margin-top: 0.75rem">
                        Latest test:
                        <strong x-text="'equidistribution / ' + (lastResult.method || method)"></strong>
                        · se =
                        <strong x-text="lastResult.se ?? '—'"></strong>
                        <template x-if="lastResult.is_me">
                            <span class="status-pill status-completed">ME</span>
                        </template>
                    </p>
                </template>

                <template x-if="error">
                    <p style="color:#c92a2a" x-text="error"></p>
                </template>
            </article>

            <template x-if="entry.notes_html">
                <article>
                    <header><strong>Notes</strong></header>
                    <div x-html="entry.notes_html"
                         x-effect="renderMath()"></div>
                </article>
            </template>
        </div>
    </template>
</div>

<script>
function generatorDetail(paperId, genId) {
    return {
        entry: null,
        busy: false,
        error: '',
        // Equidistribution method.  The default is set per-family on
        // load() (see recommendedMethod): SIMD-style families default to
        // simd_notprimitive, combined generators (J>1) default to lattice,
        // single full-period families default to matricial.
        method: 'lattice',
        lastResult: null,
        // Tracks the in-flight job so we can abandon it (clear `busy`)
        // if the user picks a different method while a worker is still
        // running.  The worker keeps going server-side — its result is
        // cached in `test_result` for next time — but the UI stops
        // waiting on it and is free to launch a new test.
        currentJobId: null,

        // Families whose characteristic polynomial is reducible due to
        // SIMD-lane redundancy.  Picking matricial/harase on these gives
        // results against the wrong (full-state) baseline, not the
        // reachable invariant subspace.  We also list the legacy YAML
        // spellings (``SFMT``, ``dSFMT``, ``DSFMT``, ``MTGP``, ``RMT64``)
        // because library entries may use those names directly without
        // going through resolve_family() before reaching the front-end.
        SIMD_FAMILIES: [
            'SFMTGen', 'DSFMTGen', 'MTGPGen', 'RMT64Gen',
            'SFMT', 'dSFMT', 'DSFMT', 'MTGP', 'RMT64',
        ],

        isReducibleChi() {
            if (!this.entry) return false;
            const fams = this.entry.components.map(c => c.family);
            if (this.entry.components.length > 1) return true;
            return fams.some(f => this.SIMD_FAMILIES.includes(f));
        },
        recommendedMethod() {
            if (!this.entry) return 'lattice';
            const fams = this.entry.components.map(c => c.family);
            if (this.entry.components.length === 1
                && this.SIMD_FAMILIES.includes(fams[0]))
                return 'simd_notprimitive';
            if (this.entry.components.length > 1) return 'lattice';
            return 'matricial';
        },
        methodBlocked() {
            // harase on reducible χ is a hard block, not just a
            // warning: the primal-lattice search has no finite upper
            // bound on the resolution loop when χ is reducible, so it
            // can run for hours without producing a result.  See
            // SFMT-607 / dSFMT / MTGP / any combined generator.
            return this.isReducibleChi() && this.method === 'harase';
        },
        methodWarning() {
            if (!this.isReducibleChi()) return '';
            if (this.method === 'matricial' || this.method === 'harase') {
                const why = this.entry.components.length > 1
                    ? 'this is a combined generator (J>'
                        + (this.entry.components.length - 1)
                        + '), so χ is the product of the per-component '
                        + 'characteristic polynomials and is reducible.'
                    : 'this is a SIMD-style family — its state carries '
                        + 'lane-redundancy bits that make χ reducible.';
                return this.method
                    + ' assumes χ is irreducible primitive (full period). '
                    + 'But ' + why
                    + ' Equidistribution will be measured against the '
                    + 'unreachable full-state baseline floor(k/l) instead '
                    + 'of the orbit dimension floor(p/l), so the reported '
                    + 'gaps and se will be inaccurate. The harase method '
                    + 'may also run very slowly or not terminate on '
                    + 'reducible χ.';
            }
            return '';
        },

        async load() {
            const r = await fetch(
                '/api/library/generators/' + encodeURIComponent(genId));
            if (r.ok) {
                this.entry = await r.json();
                // Pick a sensible default method for this family on first
                // load only — don't override an explicit user selection
                // when load() is called again after instantiate/runTest.
                if (!this._methodInitialized) {
                    this.method = this.recommendedMethod();
                    this._methodInitialized = true;
                }
            }
        },
        formatParam(v) {
            // Bitmask fields arrive from the API already formatted as
            // "0x…" strings; everything else just renders its native
            // representation.
            if (Array.isArray(v)) return '[' + v.join(', ') + ']';
            return String(v);
        },
        instantiatedLink() {
            if (!this.entry || !this.entry.instantiated) return null;
            const tg = this.entry.instantiated.tested_ids || [];
            if (tg.length) return '/tested-generators/' + tg[0];
            const pg = this.entry.instantiated.primitive_ids || [];
            if (pg.length) return '/generators/' + pg[0];
            return null;
        },
        async instantiate() {
            if (this.busy) return;
            this.busy = true; this.error = '';
            try {
                const r = await fetch(
                    '/api/library/generators/' + encodeURIComponent(genId)
                    + '/instantiate', {method: 'POST'});
                if (!r.ok) { this.error = 'Failed: ' + r.status; }
                else { await this.load(); }
            } catch (err) { this.error = err.message; }
            finally { this.busy = false; }
        },
        onMethodChange() {
            // Abandon any in-flight poll so the button frees up
            // immediately — picking a new method should never be
            // gated on a previous (now-irrelevant) test finishing.
            this.currentJobId = null;
            this.busy = false;
            this.error = '';
            this.lastResult = null;
        },
        async runTest() {
            if (this.busy) return;
            this.busy = true; this.error = ''; this.lastResult = null;
            try {
                const body = {
                    test: {type: 'equidistribution', method: this.method},
                };
                // The POST kicks off a background worker and returns a
                // job_id immediately so the page never blocks on the
                // C++ equidistribution computation.  We then poll the
                // status endpoint until the job reaches a terminal
                // state (completed / failed via HTTP 400).
                const r = await fetch(
                    '/api/library/generators/' + encodeURIComponent(genId)
                    + '/run-test',
                    {method: 'POST',
                     headers: {'Content-Type': 'application/json'},
                     body: JSON.stringify(body)});
                if (!r.ok) {
                    this.error = await this._extractError(r);
                    return;
                }
                const job = await r.json();
                if (!job || !job.job_id) {
                    this.error = 'Server did not return a job id';
                    return;
                }
                this.currentJobId = job.job_id;
                const result = await this._pollJob(job.job_id);
                // The user may have switched methods (or fired a newer
                // test) while we were polling — in that case
                // currentJobId no longer points to *us*, so silently
                // discard our result instead of overwriting whatever
                // the user is now looking at.
                if (this.currentJobId !== job.job_id) return;
                if (result === null) return;   // error already set
                this.lastResult = result;
                this.lastResult.method = this.method;
                try { await this.load(); } catch (e) {
                    // Don't let a refresh failure trap the UI in the
                    // "Running…" state — the test itself succeeded.
                    console.error('reload after run-test failed', e);
                }
            } catch (err) {
                console.error('runTest failed', err);
                this.error = err.message || String(err);
            } finally {
                this.busy = false;
            }
        },
        async _extractError(resp) {
            // Surface the structured `detail.message` from
            // HTTPException(400, …) when present; fall back to the bare
            // status code for unexpected 5xx errors.
            let msg = 'Failed: ' + resp.status;
            try {
                const err = await resp.json();
                const d = err && err.detail;
                if (d && typeof d === 'object' && d.message) {
                    msg = d.message;
                } else if (typeof d === 'string') {
                    msg = d;
                }
            } catch (_) { /* response wasn't JSON */ }
            return msg;
        },
        async _pollJob(jobId) {
            // Backoff: 250 ms for the first second, then 1 s.  Long
            // equidistribution runs can take many minutes — never time
            // out from the client side, the user can navigate away if
            // they no longer care.
            let delay = 250;
            for (let i = 0; ; i++) {
                if (i === 4) delay = 1000;
                await new Promise(res => setTimeout(res, delay));
                // Bail out early if the user abandoned this job (e.g.
                // by switching methods).  Keeps the UI responsive
                // without waiting for the final poll to come back.
                if (this.currentJobId !== jobId) return null;
                const r = await fetch(
                    '/api/library/run-test-jobs/'
                    + encodeURIComponent(jobId));
                if (!r.ok) {
                    this.error = await this._extractError(r);
                    return null;
                }
                const data = await r.json();
                if (data.status === 'completed') return data;
                // status === 'running': keep polling.
            }
        },
        renderMath() {
            if (typeof renderMathInElement !== 'function') return;
            this.$nextTick(() => {
                document.querySelectorAll('[x-html]').forEach(el => {
                    try {
                        renderMathInElement(el, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$',  right: '$',  display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true},
                            ],
                            throwOnError: false,
                        });
                    } catch (_) {}
                });
            });
        },
    };
}
</script>
{% endblock %}
