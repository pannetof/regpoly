id: blackman-vigna-2022-scrambled
authors:
  - {family: Blackman, given: David}
  - {family: Vigna, given: Sebastiano}
year: 2022
title: "Scrambled Linear Pseudorandom Number Generators"
venue: ACM Transactions on Mathematical Software
volume: "47"
issue: "4"
pages: "1-32"
doi: https://doi.org/10.1145/3460772
pdf: docs/papers/xoroshiro.pdf
bibkey: BlackmanVigna2022Scrambled
starred: true
tags: [xoroshiro, xoshiro, F2-linear, equidistribution]

abstract: |
  Two new F₂-linear transformations — xoroshiro (xor/rotate/shift/
  rotate) and xoshiro (xor/shift/rotate) — designed for fast
  superscalar implementation, paired with nonlinear scramblers
  (+, ++, *, **) that delete the linear artifacts detected by the
  binary-rank and linear-complexity tests in TestU01.  The paper
  develops the theory of word polynomials over noncommutative rings
  to compute characteristic polynomials of the linear engines, lists
  the full-period parameter triples found by exhaustive search (up to
  4096 bits of state), and proves equidistribution results for the
  scrambled generators.  The xoshiro256++/xoshiro256** combinations
  pass every empirical test the authors are aware of at 0.86 ns per
  64-bit value on commodity x86 hardware.

notes: |
  This entry catalogs only the **linear engines** — xoroshiro and
  xoshiro — i.e. the raw recurrence matrices X_{kw} and S_{4w}/S_{8w}
  from §3 of the paper.  The +/++/*/** scramblers are nonlinear
  output transforms applied to the state at read time; they do not
  alter the underlying state evolution and are not represented as
  separate ``Generator`` families in this codebase.

  The C++ classes are ``XoroshiroGen`` (rw × rw, parameter triple
  ``(A, B, C)`` with r ≥ 2) and ``XoshiroGen`` (4w × 4w or 8w × 8w,
  parameter pair ``(A, B)``).  The paper writes "k" for the word
  count; this codebase reserves k for the state size in bits, so the
  C++ classes and YAML use ``r`` (matching the variable name used by
  related papers such as Panneton & L'Ecuyer 2005).  Both use w-bit
  blocks within a single BitVect; ``w`` is capped at 64 in this
  implementation since the paper specifies generators only for
  w ∈ {16, 32, 64}.

  Reproductions: every weight in Tables 2 and 5 is reproduced by
  ``packages/regpoly/tests/test_blackman_vigna_tables.py``,
  which builds each engine, runs Berlekamp–Massey to recover the
  characteristic polynomial, and counts non-zero coefficients.
  The exhaustive primitive-polynomial counts and maximum weights of
  Tables 7-10 are reproduced for w = 16 over the state-size columns
  whose 2^k − 1 factorisation is present in
  ``packages/regpoly/src/regpoly/data/primitive_factors.json``.

  The ++ rows below carry the same engine family but a *different*
  triple than the bare xoroshiro128 row — the authors retuned (A, B, C)
  for the ++ scrambler.  Since we only represent the engine here, both
  appear as distinct parameter sets of the same C++ class.

