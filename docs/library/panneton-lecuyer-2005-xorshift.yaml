id: panneton-lecuyer-2005-xorshift
authors:
  - {family: Panneton, given: François}
  - {family: "L'Ecuyer", given: Pierre}
year: 2005
title: "On the Xorshift Random Number Generators"
venue: ACM Transactions on Modeling and Computer Simulation
volume: "15"
issue: "4"
pages: "346–361"
doi: https://doi.org/10.1145/1113316.1113319
pdf: docs/papers/xorshift.pdf
bibkey: PannetonLEcuyer2005Xorshift
starred: true
tags: [xorshift, F2-linear, equidistribution]

abstract: |
  Marsaglia (2003) introduced a class of very fast xorshift random
  number generators whose implementation uses three xorshift
  operations.  This paper studies these generators within the family
  of F₂-linear recurrences (Tausworthe, LFSR, GFSR, Mersenne twister,
  WELL, …) and shows that, even when the equidistribution criterion
  Δ₁ is small, most three-xorshift generators fail simple empirical
  tests in TestU01.  The authors search the type-II
  (vi = G vi−m ⊕ H vi−r) and type-III (three-tap) classes for w=32
  and tabulate the best generators found in Tables III and IV.  They
  also propose a seven-xorshift generator (Fig. 1) with Δ₁ = 9 and a
  thirteen-xorshift variant that pass the full Crush battery.

notes: |
  Reproductions: every Δ₁ value in Tables III and IV is reproduced
  byte-for-byte by the test
  `packages/regpoly/tests/test_panneton_lecuyer_xorshift_tables.py`,
  which builds the (rw × rw) GF(2) transition matrix in strict
  32-bit semantics and runs the existing matricial-DE kernel.

  The C++ family is `MarsaXorshiftGen` (the same class that already
  served Marsaglia 2003).  Table III generators use `type: 2`
  (two-component recurrence with up to three xorshifts per side);
  Table IV generators use `type: 100` (multi-tap with arbitrary
  shifts per tap).  Shift sign convention: positive = right shift,
  negative = left shift; the in-list order is the *application*
  order, i.e. the rightmost matrix factor in the paper appears
  first.

  `MarsaXorshiftGen.next()` masks intermediate values to w bits
  after every shift so the runtime semantics match the paper's
  `unsigned int` arithmetic: each xorshift matrix acts on a single
  w-bit word, never on more than w words.  The paper-faithful test
  above and an end-to-end runtime smoke test both confirm that the
  Δ₁ values reproduced here are the same whether obtained from the
  abstract transition matrix or from `MarsaXorshiftGen.next()`.

generators:
