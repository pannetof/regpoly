id: panneton-lecuyer-2004-f2w
authors:
  - {family: Panneton,  given: François}
  - {family: L'Ecuyer,  given: Pierre}
year: 2004
title: "Random Number Generators Based on Linear Recurrences in F_{2^w}"
venue: "Monte Carlo and Quasi-Monte Carlo Methods 2004"
pdf: docs/papers/f2w.pdf
doi: https://doi.org/10.1007/3-540-31186-6
bibkey: PannetonLEcuyer2004F2w
starred: true
tags: [F2w, LFSR, PolyLCG, F2-linear, MCQMC]

abstract: |
  This paper explores new ways of constructing and implementing random
  number generators based on linear recurrences in a finite field with
  2^w elements, for some integer w.  Two types of constructions are
  examined: an LFSR in F_{2^w} (state s_n, recurrence (6)) and a
  polynomial LCG in F_{2^w}[z]/P(z) (state q_n, recurrence (7)); the
  two are related by transposition of the F₂-state transition matrix.
  Concrete parameter sets are given for generators with good
  equidistribution properties whose speed is comparable to that of the
  fastest generators available at the time.  Two implementation
  techniques use precomputed tables to speed up multiplications in
  F_{2^w}: a general-coefficient layout (Table 1, truncation output
  B = T_L) and a special form (eq. 14) with small s_{b_i} and d_{b_i}
  bounds (Table 2, Matsumoto-Kurita tempering output B = M_L with
  s1=7, s2=15).

notes: |
  Each row of paper Tables 1 and 2 appears twice — once with
  family: F2wLFSRGen, once with family: F2wPolyLCGGen — because the
  paper (§1, p.3) states that LFSR and PolyLCG with L = w = 32 and
  B = (B̃ 0) (B̃ a w×w matrix) share the same characteristic
  polynomial and equidistribution.  Both Table 1 (B̃ = I_w) and
  Table 2 (B̃ = M-K mask) satisfy this precondition.
  
  Table 1 uses truncation output (tempering: []); Table 2 uses
  Matsumoto-Kurita type I tempering (tempMK with eta=s1=7,
  mu=s2=15, plus per-row b/c).  The s column in Table 2 (3 or 7) is
  the search-time bound on s_{b_i} from form (14), not a runtime
  parameter; reflected only in the entry id.
  
  `modM = a` (the paper's hex bit-vector verbatim, LSB-first packing:
  bit i = coefficient of z^i in M(z) for 0 ≤ i < w; the leading z^w
  bit is implicit in the F2w arithmetic loop, so do NOT OR (1 << w) in).
  Convention verified empirically: every paper row in this catalog has
  `is_full_period` = true with this encoding (the alternative `(1<<w)|a`
  would give a non-primitive characteristic polynomial).
  `modM` currently displays as a long decimal in the web UI because
  the C++ ParamSpec marks it `rand_type=""` rather than "bitmask";
  this is cosmetic and unrelated to correctness.

