id: saito-2009-dsfmt
authors:
  - {family: Saito, given: Mutsuo}
year: 2009
title: "An application of finite field: design and implementation of 128-bit instruction-based fast pseudorandom number generator"
venue: "Master's thesis, Hiroshima University"
doi: https://doi.org/10.15027/29071
bibkey: Saito2009
starred: true
tags: [MT, dSFMT, double-precision, 128bit]

abstract: |
  The double-precision SIMD-oriented Fast Mersenne Twister (dSFMT) is
  a Mersenne-Twister variant tuned for direct emission of IEEE-754
  double-precision floating-point fractions in [1, 2). Two 52-bit
  mantissa fractions are packed into each 128-bit recurrence step,
  removing the rejection step required when extracting doubles from a
  general-purpose integer MT. The recurrence threads a 128-bit "lung"
  carry through a circular buffer of 128-bit blocks; bit positions
  outside the mantissa region are masked off by per-lane masks.

notes: |
  Full cross-check parameter sets for MEXP = 521, 1279, 2203, 4253,
  11213, 19937, 44497, 86243, 132049, 216091 live in
  `docs/library/dsfmt_params.yaml` (the MTToolBox-aligned fixture).
  The entries here cover the three most commonly-cited mexps; mirror
  the params file when adding more.

