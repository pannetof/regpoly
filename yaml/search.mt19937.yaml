# Verify equidistribution of MT19937 (Matsumoto & Nishimura, 1998)
# (w,n,m,r) = (32, 624, 397, 31), a = 0x9908B0DF
# Tempering: u=11, s=7, b=0x9D2C5680, t=15, c=0xEFC60000, l=18
# Period: 2^19937 - 1
# k = 32*624 - 31 = 19937

search:
  seed: [1059674621, 1170794524]
  Lmax: 32
  nbtries: 1

components:
  - generators:
      family: MT
      common:
        w: 32
        r: 624
        m: 397
        p: 31
      generators:
        - a: 0x9908b0df
    tempering:
      - type: tempMK2
        w: 32
        eta: 7
        mu: 15
        u: 11
        l: 18
        b: 0x9d2c5680
        c: 0xefc60000

tests:
  - type: equidistribution
    method: lattice
    max_gap_sum: 100000
