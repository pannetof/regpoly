name: docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install docs deps (skip workspace packages — site is markdown-only)
        run: |
          uv python install 3.11
          uv sync --group docs \
            --no-install-package regpoly-cpp \
            --no-install-package regpoly \
            --no-install-package regpoly-web

      - name: Configure git for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy MkDocs site to gh-pages
        working-directory: docs
        run: uv run mkdocs gh-deploy --force --remote-name origin
