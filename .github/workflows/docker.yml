name: docker

# Tag-driven release model:
#   - every push to master   → push :sha-<short> only
#   - every v* tag           → also push :latest + :vX.Y.Z
#   - workflow_dispatch      → manual rebuild
#
# Multi-arch image (linux/amd64 + linux/arm64) via QEMU on the
# standard ubuntu-24.04 runner. The arm64 leg runs the C++ compile
# under emulation; expect ~15 min cold, ~5 min cached. If CI time
# becomes painful, split into a matrix (amd64 native + arm64 native
# on ubuntu-24.04-arm) and merge manifests with `buildx imagetools`.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/yaml-cpp

      - name: uv lock check
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv lock --check

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pannetof/regpoly
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag

      # Smoke build: amd64 only, loaded into the local Docker daemon
      # so we can `docker run` it. buildx can't load multi-arch
      # locally — we only need one arch to validate the artifact, and
      # amd64 runs natively on the runner (fast). The multi-arch push
      # below builds for both platforms from the cache.
      - name: Build for smoke (amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: regpoly:smoke
          cache-from: type=registry,ref=ghcr.io/pannetof/regpoly:cache
          cache-to: type=registry,ref=ghcr.io/pannetof/regpoly:cache,mode=min

      - name: Image smoke — imports
        # Proves the C++ extension loads, the migration entry point
        # imports, and the FastAPI factory imports against the image's
        # baked-in Python env. Cheap; runs in ~2s.
        run: |
          docker run --rm regpoly:smoke python -c "
          import regpoly._regpoly_cpp
          from regpoly_web.database import init_db
          from regpoly_web.app import create_app
          print('OK')
          "

      - name: Image smoke — prod-shape boot against ephemeral PG
        # Spin up a throw-away postgres + web on a docker network and
        # curl /healthz. The web container's FastAPI lifespan applies
        # migrations on its own — proves the no-init-container path
        # end-to-end.
        run: |
          set -eux
          docker network create regpoly-smoke
          docker run -d --rm --name pg --network regpoly-smoke \
            -e POSTGRES_USER=regpoly \
            -e POSTGRES_PASSWORD=devpw \
            -e POSTGRES_DB=regpoly \
            postgres:16.6-alpine
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U regpoly && break
            sleep 1
          done
          docker run -d --rm --name web --network regpoly-smoke \
            -e REGPOLY_DB_URL=postgresql://regpoly:devpw@pg:5432/regpoly \
            -e REGPOLY_WEB_DISABLE_INTERNAL_POOL=1 \
            regpoly:smoke \
            uvicorn regpoly_web.app:app --host 0.0.0.0 --port 8000
          for i in $(seq 1 30); do
            if docker run --rm --network regpoly-smoke curlimages/curl:8.10.1 \
                -fsS http://web:8000/healthz | grep -q '"db":"up"'; then
              echo "/healthz reports db=up"
              break
            fi
            sleep 1
          done
          docker stop web || true
          docker stop pg || true
          docker network rm regpoly-smoke || true

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/pannetof/regpoly:cache
          cache-to: type=registry,ref=ghcr.io/pannetof/regpoly:cache,mode=min
