name: docker

# Tag-driven Pattern B release model:
#   - every push to master   → push :sha-<short> only
#   - every v* tag           → also push :latest + :vX.Y.Z
#   - workflow_dispatch      → manual rebuild
#
# Repo is public, so ubuntu-24.04-arm runners are free.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/yaml-cpp

      - name: uv lock check
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv lock --check

      # NOTE: CI grep gates (no app.state.pool refs in routes; sync
      # C++ probes wrapped in asyncio.to_thread) live in ci.yml so
      # they run on every PR/push, not just docker workflow triggers.
      # They will be added once the Phase 2 worker-split cutover lands
      # — running them today would fail the build because routes still
      # carry the legacy pool refs.

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pannetof/regpoly
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag

      # Build to a local tag first so we can smoke-test before pushing.
      - name: Build (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: regpoly:smoke
          cache-from: type=registry,ref=ghcr.io/pannetof/regpoly:cache
          cache-to: type=registry,ref=ghcr.io/pannetof/regpoly:cache,mode=min

      - name: Smoke-test C++ extension import
        run: docker run --rm regpoly:smoke python -c "import regpoly._regpoly_cpp; print('OK')"

      - name: Smoke-test prod-mode boot against ephemeral PG
        # Spin up a throw-away postgres on a docker network, run the
        # init module inside the image to apply migrations, then start
        # uvicorn with REGPOLY_WEB_DISABLE_INTERNAL_POOL=1 and curl
        # /healthz. Proves the published artifact actually boots in
        # the production shape (no in-process worker pool, real PG).
        run: |
          set -eux
          docker network create regpoly-smoke
          docker run -d --rm --name pg --network regpoly-smoke \
            -e POSTGRES_USER=regpoly \
            -e POSTGRES_PASSWORD=devpw \
            -e POSTGRES_DB=regpoly \
            postgres:16.6-alpine
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U regpoly && break
            sleep 1
          done
          # Apply migrations.
          docker run --rm --network regpoly-smoke \
            -e REGPOLY_DB_URL=postgresql://regpoly:devpw@pg:5432/regpoly \
            regpoly:smoke python -m regpoly_web.init --reap-orphans
          # Boot uvicorn in the prod shape and curl /healthz.
          docker run -d --rm --name web --network regpoly-smoke \
            -e REGPOLY_DB_URL=postgresql://regpoly:devpw@pg:5432/regpoly \
            -e REGPOLY_WEB_DISABLE_INTERNAL_POOL=1 \
            regpoly:smoke \
            uvicorn regpoly_web.app:app --host 0.0.0.0 --port 8000
          for i in $(seq 1 30); do
            if docker run --rm --network regpoly-smoke curlimages/curl:8.10.1 \
                -fsS http://web:8000/healthz | grep -q '"db":"up"'; then
              echo "/healthz reports db=up"
              break
            fi
            sleep 1
          done
          docker stop web || true
          docker stop pg || true
          docker network rm regpoly-smoke || true

      - name: Push (with computed tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/pannetof/regpoly:cache
          cache-to: type=registry,ref=ghcr.io/pannetof/regpoly:cache,mode=min
