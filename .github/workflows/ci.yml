name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/yaml-cpp (dockerize-plan 0b)

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libntl-dev cmake build-essential pybind11-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python and workspace
        run: |
          uv python install 3.11
          uv sync --group test --group lint

      - name: Build C++ tests
        run: |
          cmake -S packages/regpoly-cpp -B build -DREGPOLY_BUILD_TESTS=ON
          cmake --build build -j

      - name: Run ctest
        run: ctest --test-dir build --output-on-failure

      - name: Run pytest (default lane)
        run: uv run pytest

      - name: ruff check
        run: uv run ruff check .

      - name: routes must not call pool.submit (Phase 2 worker split)
        # Routes write `pending` rows only; the worker scheduler
        # claims them via FOR UPDATE SKIP LOCKED. Direct pool.submit
        # in a route would re-introduce the web/worker coupling the
        # dockerize plan removed.
        run: |
          if grep -rnE 'app\.state\.(analysis_)?pool\.(submit|executor)' packages/regpoly-web/src/regpoly_web/routes/; then
            echo "::error::Found app.state.pool reference in routes after worker split"; exit 1
          fi

      - name: sync C++ probes in routes must use asyncio.to_thread
        # Heuristic: any Generator.create(/build_gen_enumerator( in a
        # route handler must have an `asyncio.to_thread` neighbour
        # (or an explicit `# ok-sync` escape).
        run: |
          if grep -rnE '\b(Generator\.create|build_gen_enumerator)\(' packages/regpoly-web/src/regpoly_web/routes/ \
              | grep -vE 'asyncio\.to_thread|# ok-sync'; then
            echo "::error::Sync C++ probe in route handler — wrap in asyncio.to_thread"; exit 1
          fi

      # ruff format --check is intentionally not run during the v2.0 redesign:
      # the existing research codebase predates ruff format and reformatting
      # would create churn that obscures the C++/Python migration diffs.
      # Re-enable in a later phase after the Python wrapper layer is rewritten.

      - name: import-linter
        run: uv run lint-imports
