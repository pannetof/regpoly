name: ci-slow

on:
  schedule:
    - cron: "0 6 * * *"  # nightly at 06:00 UTC
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  workflow_dispatch: {}

jobs:
  slow-and-e2e:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'slow')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/yaml-cpp (dockerize-plan 0b)

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libntl-dev cmake build-essential pybind11-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python and workspace
        run: |
          uv python install 3.11
          uv sync --group test --group e2e

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Build C++ tests
        run: |
          cmake -S packages/regpoly-cpp -B build -DREGPOLY_BUILD_TESTS=ON
          cmake --build build -j

      - name: Run ctest
        run: ctest --test-dir build --output-on-failure

      # Two invocations: e2e's session-scoped uvicorn fixture leaves
      # event-loop / pgserver state that confuses pytest-asyncio's
      # default-lane coroutine wrapping when both run in one process.
      # Each invocation gets a fresh interpreter.
      - name: Run pytest (default + slow)
        run: uv run pytest -m "slow or (not slow and not e2e)"

      - name: Run pytest (e2e)
        # --timeout=0 disables per-test pytest-timeout — see the
        # watchdog rationale in packages/regpoly-web/tests/e2e/conftest.py.
        run: uv run pytest -m e2e --timeout=0
