[build-system]
requires = ["scikit-build-core>=0.8", "pybind11>=2.12"]
build-backend = "scikit_build_core.build"

[project]
name = "regpoly-cpp"
version = "2.0.0"
description = "C++ core for REGPOLY: GF(2) linear recurrence analysis, MT-family generators, lattice methods. Exposed to Python as regpoly._regpoly_cpp."
requires-python = ">=3.10"
license = "BSD-3-Clause"
authors = [{name = "Francois Panneton, Ph.D."}]

[tool.scikit-build]
wheel.packages = ["src/regpoly_cpp"]
cmake.version = ">=3.20"
