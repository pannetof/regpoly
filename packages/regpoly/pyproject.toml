[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "regpoly"
version = "2.0.0"
description = "Pure-Python library for analysing combined PRNGs based on GF(2) linear recurrences. Wraps the regpoly-cpp native core."
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "pyyaml",
    "regpoly-cpp",
]

[project.scripts]
regpoly = "regpoly.io.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false

[tool.pytest.ini_options]
markers = [
    "slow: heavy cross-checks (mexp > 20000); opt in with `pytest -m slow`",
]
addopts = "-m 'not slow'"
