{% extends "base.html" %}

{% block title %}{{ gen_id }} ({{ paper_id }}){% endblock %}

{% block content %}
<div x-data='generatorDetail("{{ paper_id }}", "{{ gen_id }}")'
     x-init="load()" data-library-detail>

  <template x-if="!entry">
    <p class="text-secondary">Loading…</p>
  </template>

  <template x-if="entry">
    <div>

      <!-- Header strip: title + chips + action buttons -->
      <div class="d-flex align-items-center mb-3 flex-wrap gap-2">
        <h2 class="mb-0">
          <span class="text-secondary">Library generator</span>
          <span x-text="entry.display"></span>
          <template x-if="entry.starred">
            <svg width="18" height="18" class="ms-1 text-warning"
                 aria-label="Featured generator">
              <use href="#tabler-star-filled"/>
            </svg>
          </template>
        </h2>
        <span class="ms-2 text-secondary">
          <span x-text="entry.family"></span> ·
          J=<span x-text="entry.J"></span> ·
          L<sub>max</sub>=<span x-text="entry.Lmax"></span>
        </span>

        <div class="ms-auto btn-list">
          <a class="btn btn-sm btn-outline-secondary"
             :href="'/library/' + entry.paper.id">
            <svg width="14" height="14"><use href="#tabler-arrow-left"/></svg>
            <span x-text="entry.paper.display"></span>
          </a>
          <template x-if="instantiatedLink()">
            <a class="btn btn-sm btn-outline-success"
               :href="instantiatedLink()" target="_top">
              <svg width="14" height="14"><use href="#tabler-check"/></svg>
              View stored generator
            </a>
          </template>
          <template x-if="!instantiatedLink()">
            <button type="button" class="btn btn-sm btn-primary"
                    @click="instantiate()"
                    :disabled="busy">
              <span x-text="busy ? 'Working…' : 'Create in database'"></span>
            </button>
          </template>
        </div>
      </div>

      <!-- Validation errors (rare) -->
      <template x-if="entry.errors && entry.errors.length">
        <div class="alert alert-danger" role="alert">
          <h4 class="alert-title">Validation errors</h4>
          <ul class="mb-0">
            <template x-for="err in entry.errors" :key="err">
              <li x-text="err"></li>
            </template>
          </ul>
        </div>
      </template>

      <!-- Metric cards row -->
      <div class="row row-cards mb-3">
        <div class="col-sm-6 col-lg-3">
          <div class="card card-sm">
            <div class="card-body">
              <div class="font-weight-medium">J</div>
              <div class="display-number" x-text="entry.J"></div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="card card-sm">
            <div class="card-body">
              <div class="font-weight-medium">L<sub>max</sub></div>
              <div class="display-number" x-text="entry.Lmax"></div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="card card-sm">
            <div class="card-body">
              <div class="font-weight-medium">Components</div>
              <div class="display-number"
                   x-text="entry.components.length"></div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="card card-sm">
            <div class="card-body">
              <div class="font-weight-medium">Status</div>
              <div class="mt-1">
                <template x-if="instantiatedLink()">
                  <span class="badge bg-success-lt">In database</span>
                </template>
                <template x-if="!instantiatedLink()">
                  <span class="badge bg-secondary-lt">Reference only</span>
                </template>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Components card -->
      <div class="card mb-3">
        <div class="card-header">
          <h3 class="card-title">
            Components
            (<span x-text="entry.components.length"></span>)
          </h3>
        </div>
        <div class="card-body">
          <template x-for="(c, ci) in entry.components" :key="ci">
            <div class="mb-3">
              <h4 class="mb-1">
                Component <span x-text="ci + 1"></span>:
                <span x-text="c.family"></span>
                <small class="text-secondary">
                  L=<span x-text="c.L"></span>
                </small>
              </h4>
              <details>
                <summary>Generator parameters</summary>
                <table class="table table-sm mt-1 mb-2">
                  <template x-for="[k, v] in Object.entries(c.params)"
                            :key="k">
                    <tr>
                      <td class="mono text-secondary" style="width: 14rem"
                          x-text="k"></td>
                      <td class="mono" x-text="formatParam(v)"></td>
                    </tr>
                  </template>
                </table>
              </details>
              <template x-if="c.tempering && c.tempering.length">
                <details open>
                  <summary>
                    Tempering chain
                    (<span x-text="c.tempering.length"></span>)
                  </summary>
                  <template x-for="(t, ti) in c.tempering" :key="ti">
                    <div class="ms-3 mt-1">
                      <strong x-text="(ti + 1) + '. ' + t.type"></strong>
                      <table class="table table-sm mt-1 mb-2">
                        <template x-for="[k, v] in Object.entries(t).filter(([k]) => k !== 'type')"
                                  :key="k">
                          <tr>
                            <td class="mono text-secondary"
                                style="width: 14rem" x-text="k"></td>
                            <td class="mono" x-text="formatParam(v)"></td>
                          </tr>
                        </template>
                      </table>
                    </div>
                  </template>
                </details>
              </template>
              <template x-if="!c.tempering || !c.tempering.length">
                <p class="text-secondary small mb-0">
                  <em>No tempering on this component.</em>
                </p>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Run-test card -->
      <div class="card mb-3">
        <div class="card-header">
          <h3 class="card-title">Run a test</h3>
        </div>
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-6">
              <label class="form-label">Equidistribution method</label>
              <select class="form-select" x-model="method"
                      @change="onMethodChange()">
                <option value="" disabled>— pick a method —</option>
                <option value="matricial">matricial — Gaussian elimination</option>
                <option value="lattice">lattice — Couture–L'Ecuyer–Tezuka dual lattice</option>
                <option value="harase">harase — primal lattice (full-period only)</option>
                <option value="notprimitive">notprimitive — Berlekamp–Massey on subspace</option>
                <option value="simd_notprimitive">simd_notprimitive — SFMT/dSFMT/MTGP</option>
              </select>
            </div>
            <div class="col-md-6 d-flex align-items-end">
              <button type="button" class="btn btn-primary"
                      @click="runTest()"
                      :disabled="busy || methodBlocked() || !method"
                      :title="methodBlocked()
                          ? 'harase does not terminate on this generator '
                            + '(reducible χ); pick simd_notprimitive or lattice'
                          : (!method ? 'Pick a method first' : '')">
                <svg width="14" height="14" class="me-1"
                     x-show="!busy"><use href="#tabler-player-play"/></svg>
                <span x-text="busy ? 'Running…' : 'Run test'"></span>
              </button>
            </div>
          </div>

          <template x-if="methodBlocked()">
            <div class="alert alert-danger mt-3 mb-0" role="alert">
              <h4 class="alert-title">harase is disabled for this generator</h4>
              <p class="mb-0">
                The primal-lattice search does not terminate on a reducible
                characteristic polynomial, which is the case here. Pick
                <code class="mono" x-text="recommendedMethod()"></code> instead.
              </p>
            </div>
          </template>

          <template x-if="!methodBlocked() && methodWarning()">
            <div class="alert mt-3 mb-0"
                 :class="methodOverrideIsUnsafe()
                         ? 'alert-danger' : 'alert-warning'"
                 role="alert">
              <h4 class="alert-title"
                  x-text="methodOverrideIsUnsafe()
                          ? 'Method gives wrong baseline' : 'Warning'"></h4>
              <p class="mb-1" x-text="methodWarning()"></p>
              <p class="mb-0 small">
                Recommended for this generator:
                <code class="mono" x-text="recommendedMethod()"></code>.
              </p>
            </div>
          </template>

          <template x-if="error">
            <div class="alert alert-danger mt-3 mb-0" role="alert"
                 x-text="error"></div>
          </template>

          <template x-if="lastResult">
            <div class="mt-3">
              <div class="d-flex align-items-center flex-wrap gap-2 mb-2">
                <strong>Latest test:</strong>
                equidistribution / <code class="mono"
                                         x-text="lastResult.method || method"></code>
                · se = <strong x-text="lastResult.se ?? '—'"></strong>
                <template x-if="lastResult.is_me">
                  <span class="badge bg-success-lt">ME</span>
                </template>
              </div>
              <template x-if="lastResult.detail && lastResult.detail.ecart">
                <details open>
                  <summary>Dimension-gap profile
                    (<span x-text="Object.keys(lastResult.detail.ecart).length"></span>
                    non-zero of <span x-text="entry.Lmax"></span>)</summary>
                  <div class="table-responsive mt-2">
                    <template x-for="stripe in equidStripes(lastResult.detail.ecart, entry.Lmax)"
                              :key="stripe.start">
                      <table class="table table-sm table-bordered mono mb-2 equidist-grid">
                        <thead>
                          <tr>
                            <th class="text-secondary"
                                style="white-space: nowrap;">ℓ</th>
                            <template x-for="cell in stripe.cells"
                                      :key="cell.l">
                              <th class="text-center text-secondary"
                                  x-text="cell.l"></th>
                            </template>
                          </tr>
                        </thead>
                        <tbody>
                          <tr>
                            <th class="text-secondary"
                                style="white-space: nowrap;">δ</th>
                            <template x-for="cell in stripe.cells"
                                      :key="cell.l">
                              <td class="text-center"
                                  :class="cell.gap === 0 ? 'equidist-cell-ok'
                                          : cell.gap <= 2 ? 'equidist-cell-warn'
                                                          : 'equidist-cell-bad'"
                                  x-text="cell.gap === 0 ? '' : cell.gap"></td>
                            </template>
                          </tr>
                        </tbody>
                      </table>
                    </template>
                  </div>
                </details>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Test results card (from linked tested-generators) -->
      <template x-if="storedResults.length">
        <div class="card mb-3">
          <div class="card-header d-flex align-items-center justify-content-between">
            <h3 class="card-title">Test results</h3>
            <span class="text-secondary small">
              from
              <template x-for="(tid, i) in (entry.instantiated && entry.instantiated.tested_ids) || []"
                        :key="tid">
                <span>
                  <a :href="'/tested-generators/' + tid"
                     x-text="'#' + tid"></a><template x-if="i + 1 < (entry.instantiated.tested_ids || []).length">, </template>
                </span>
              </template>
            </span>
          </div>
          <div class="card-body">
            <template x-for="(r, idx) in storedResults" :key="r._key">
              <div class="mb-4 pb-3 border-bottom">
                <div class="d-flex align-items-center flex-wrap gap-2 mb-2">
                  <strong x-text="r.test_type"></strong>
                  <template x-if="testMethod(r)">
                    <span class="text-secondary small">
                      · <code x-text="testMethod(r)"></code>
                    </span>
                  </template>
                  <a class="badge bg-secondary-lt text-decoration-none"
                     :href="'/tested-generators/' + r._tested_gen_id"
                     x-text="'#' + r._tested_gen_id"></a>
                  <template x-if="r.is_me">
                    <span class="badge bg-success-lt">ME</span>
                  </template>
                  <template x-if="r.verified">
                    <span class="badge bg-success-lt">verified ✓</span>
                  </template>
                  <template x-if="r.elapsed_seconds != null">
                    <span class="badge bg-secondary-lt"
                          x-text="formatElapsed(r.elapsed_seconds)"></span>
                  </template>
                </div>
                <ul class="list-unstyled mb-2">
                  <template x-if="r.se !== null && r.se !== undefined">
                    <li>se = <strong x-text="r.se"></strong></li>
                  </template>
                  <template x-if="r.secf !== null && r.secf !== undefined">
                    <li>secf = <span x-text="r.secf"></span></li>
                  </template>
                </ul>
                <template x-if="r.detail && r.detail.ecart">
                  <details open>
                    <summary>Dimension-gap profile
                      (<span x-text="Object.keys(r.detail.ecart).length"></span>
                      non-zero of <span x-text="entry.Lmax"></span>)</summary>
                    <div class="table-responsive mt-2">
                      <template x-for="stripe in equidStripes(r.detail.ecart, entry.Lmax)"
                                :key="stripe.start">
                        <table class="table table-sm table-bordered mono mb-2 equidist-grid">
                          <thead>
                            <tr>
                              <th class="text-secondary"
                                  style="white-space: nowrap;">ℓ</th>
                              <template x-for="cell in stripe.cells"
                                        :key="cell.l">
                                <th class="text-center text-secondary"
                                    x-text="cell.l"></th>
                              </template>
                            </tr>
                          </thead>
                          <tbody>
                            <tr>
                              <th class="text-secondary"
                                  style="white-space: nowrap;">δ</th>
                              <template x-for="cell in stripe.cells"
                                        :key="cell.l">
                                <td class="text-center"
                                    :class="cell.gap === 0 ? 'equidist-cell-ok'
                                            : cell.gap <= 2 ? 'equidist-cell-warn'
                                                            : 'equidist-cell-bad'"
                                    x-text="cell.gap === 0 ? '' : cell.gap"></td>
                              </template>
                            </tr>
                          </tbody>
                        </table>
                      </template>
                    </div>
                  </details>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Notes card -->
      <template x-if="entry.notes_html">
        <div class="card mb-3">
          <div class="card-header">
            <h3 class="card-title">Notes</h3>
          </div>
          <div class="card-body">
            <div x-html="entry.notes_html"
                 x-effect="renderMath()"></div>
          </div>
        </div>
      </template>

    </div>
  </template>
</div>

<script>
function generatorDetail(paperId, genId) {
    return {
        entry: null,
        busy: false,
        error: '',
        // Aggregated test-results pulled from any tested_generator rows
        // linked to this library entry (instantiated.tested_ids[]).
        storedResults: [],
        // Equidistribution method. Initialised on load() from
        // entry.default_test_methods.equidistribution, which is computed
        // server-side by the C++ Generator::default_test_method override.
        // No client-side family table — the rule lives in C++ exactly once.
        method: '',
        lastResult: null,
        // Tracks the in-flight job so we can abandon it (clear `busy`)
        // if the user picks a different method while a worker is still
        // running.
        currentJobId: null,

        recommendedMethod() {
            const m = this.entry
                && this.entry.default_test_methods
                && this.entry.default_test_methods.equidistribution;
            return m || '';
        },
        // True when the recommended method indicates a reducible
        // characteristic polynomial (notprimitive / simd_notprimitive).
        // Used to gate harase, which does not terminate on reducible χ.
        isReducibleChi() {
            const m = this.recommendedMethod();
            return m === 'notprimitive' || m === 'simd_notprimitive';
        },
        methodBlocked() {
            return this.isReducibleChi() && this.method === 'harase';
        },
        // True when the chosen method assumes primitive χ but the
        // recommended method indicates reducible χ. matricial / harase
        // on a SIMD or combined generator measures equidistribution
        // against the unreachable full-state baseline floor(k/l)
        // instead of floor(p/l) — the result is numerically wrong, not
        // just suboptimal. Surfaced as a danger (red) banner rather
        // than a warning (yellow).
        methodOverrideIsUnsafe() {
            return this.isReducibleChi()
                && (this.method === 'matricial'
                    || this.method === 'harase');
        },
        methodWarning() {
            const rec = this.recommendedMethod();
            if (!rec || this.method === rec) return '';
            const why = {
                'simd_notprimitive':
                    'this is a SIMD-style family — its state carries '
                    + 'lane-redundancy bits that make χ reducible.',
                'notprimitive':
                    'this is a combined generator, so χ is the product '
                    + 'of the per-component characteristic polynomials '
                    + 'and is reducible.',
                'harase':
                    'a primal-lattice search is faster than matricial '
                    + 'on this generator size.',
                'matricial':
                    'matricial is the canonical method for small '
                    + 'full-period generators.',
            }[rec] || '';
            if (this.method === 'matricial' || this.method === 'harase') {
                if (rec === 'simd_notprimitive' || rec === 'notprimitive') {
                    return this.method
                        + ' assumes χ is irreducible primitive (full '
                        + 'period). But ' + why
                        + ' Equidistribution will be measured against '
                        + 'the unreachable full-state baseline '
                        + 'floor(k/l) instead of the orbit dimension '
                        + 'floor(p/l), so the reported gaps and se will '
                        + 'be inaccurate. The harase method may also '
                        + 'run very slowly or not terminate on reducible χ.';
                }
            }
            return 'Recommended for this generator: ' + rec
                + (why ? ' — ' + why : '') + '.';
        },

        async load() {
            const r = await fetch(
                '/api/library/generators/' + encodeURIComponent(genId));
            if (r.ok) {
                this.entry = await r.json();
                if (!this._methodInitialized) {
                    this.method = this.recommendedMethod();
                    this._methodInitialized = true;
                }
                await this._loadStoredResults();
            }
        },

        async _loadStoredResults() {
            // Fan out to /api/v2/tested-generators/<id> for every linked
            // row and collect their results so the user sees the test
            // history without round-tripping into the catalog page.
            const tids = (this.entry
                          && this.entry.instantiated
                          && this.entry.instantiated.tested_ids) || [];
            if (!tids.length) {
                this.storedResults = [];
                return;
            }
            const fetched = await Promise.all(tids.map(async (tid) => {
                try {
                    const resp = await fetch(
                        '/api/v2/tested-generators/' + encodeURIComponent(tid));
                    if (!resp.ok) return null;
                    return await resp.json();
                } catch (_) { return null; }
            }));
            const out = [];
            fetched.forEach((tg, i) => {
                if (!tg) return;
                const tid = tids[i];
                (tg.results || []).forEach((res, j) => {
                    out.push({
                        ...res,
                        _tested_gen_id: tid,
                        _key: tid + ':' + j,
                    });
                });
            });
            this.storedResults = out;
        },

        testMethod(r) {
            const cfg = r.test_config || {};
            return cfg.method || cfg.algorithm || null;
        },

        formatElapsed(s) {
            if (s == null) return '';
            if (s < 60) return s.toFixed(2) + 's';
            if (s < 3600) return Math.round(s / 60) + 'm';
            return (s / 3600).toFixed(1) + 'h';
        },
        formatParam(v) {
            if (Array.isArray(v)) return '[' + v.join(', ') + ']';
            if (v && typeof v === 'object') return JSON.stringify(v);
            return String(v);
        },
        instantiatedLink() {
            if (!this.entry || !this.entry.instantiated) return null;
            const tg = this.entry.instantiated.tested_ids || [];
            if (tg.length) return '/tested-generators/' + tg[0];
            const pg = this.entry.instantiated.primitive_ids || [];
            if (pg.length) return '/generators/' + pg[0];
            return null;
        },
        async instantiate() {
            if (this.busy) return;
            this.busy = true; this.error = '';
            try {
                const r = await fetch(
                    '/api/library/generators/' + encodeURIComponent(genId)
                    + '/instantiate', {method: 'POST'});
                if (!r.ok) { this.error = 'Failed: ' + r.status; }
                else { await this.load(); }
            } catch (err) { this.error = err.message; }
            finally { this.busy = false; }
        },
        onMethodChange() {
            this.currentJobId = null;
            this.busy = false;
            this.error = '';
            this.lastResult = null;
        },
        async runTest() {
            if (this.busy) return;
            this.busy = true; this.error = ''; this.lastResult = null;
            try {
                const body = {
                    test: {type: 'equidistribution', method: this.method},
                };
                const r = await fetch(
                    '/api/library/generators/' + encodeURIComponent(genId)
                    + '/run-test',
                    {method: 'POST',
                     headers: {'Content-Type': 'application/json'},
                     body: JSON.stringify(body)});
                if (!r.ok) {
                    this.error = await this._extractError(r);
                    return;
                }
                const job = await r.json();
                if (!job || !job.job_id) {
                    this.error = 'Server did not return a job id';
                    return;
                }
                this.currentJobId = job.job_id;
                const result = await this._pollJob(job.job_id);
                if (this.currentJobId !== job.job_id) return;
                if (result === null) return;
                this.lastResult = result;
                this.lastResult.method = this.method;
                try { await this.load(); } catch (e) {
                    console.error('reload after run-test failed', e);
                }
            } catch (err) {
                console.error('runTest failed', err);
                this.error = err.message || String(err);
            } finally {
                this.busy = false;
            }
        },
        async _extractError(resp) {
            let msg = 'Failed: ' + resp.status;
            try {
                const err = await resp.json();
                const d = err && err.detail;
                if (d && typeof d === 'object' && d.message) {
                    msg = d.message;
                } else if (typeof d === 'string') {
                    msg = d;
                }
            } catch (_) { /* response wasn't JSON */ }
            return msg;
        },
        async _pollJob(jobId) {
            let delay = 250;
            for (let i = 0; ; i++) {
                if (i === 4) delay = 1000;
                await new Promise(res => setTimeout(res, delay));
                if (this.currentJobId !== jobId) return null;
                const r = await fetch(
                    '/api/library/run-test-jobs/'
                    + encodeURIComponent(jobId));
                if (!r.ok) {
                    this.error = await this._extractError(r);
                    return null;
                }
                const data = await r.json();
                if (data.status === 'completed') return data;
            }
        },

        // Same horizontal-stripe layout as tested_generators/detail.html
        equidStripes(ecart, lmax, width = 32) {
            const max = Math.max(1, lmax | 0);
            const stripes = [];
            for (let start = 1; start <= max; start += width) {
                const end = Math.min(start + width - 1, max);
                const cells = [];
                for (let l = start; l <= end; l++) {
                    const gap = (ecart[l] ?? ecart[String(l)] ?? 0) | 0;
                    cells.push({ l, gap });
                }
                stripes.push({ start, end, cells });
            }
            return stripes;
        },

        renderMath() {
            if (typeof renderMathInElement !== 'function') return;
            this.$nextTick(() => {
                document.querySelectorAll('[x-html]').forEach(el => {
                    try {
                        renderMathInElement(el, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$',  right: '$',  display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true},
                            ],
                            throwOnError: false,
                        });
                    } catch (_) {}
                });
            });
        },
    };
}
</script>
{% endblock %}
