[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "regpoly-web"
version = "2.0.0"
description = "FastAPI web shell over the regpoly library: search runs, generator catalogue, results browser."
requires-python = ">=3.10"
license = "BSD-3-Clause"
authors = [{name = "Francois Panneton, Ph.D."}]
dependencies = [
    "regpoly",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "aiosqlite>=0.19",
    # psycopg3 (async + sync from one library) — added in dockerize plan
    # Phase 1. aiosqlite stays alongside through the cutover commit so
    # the existing SQLite-based code keeps working.
    "psycopg[binary,pool]>=3.2",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    "markdown>=3.5",
]

[project.scripts]
regpoly-web = "regpoly_web.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false

[tool.setuptools.package-data]
regpoly_web = ["schema.sql", "templates/**/*.html", "static/**/*"]
