[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "regpoly-legacy"
version = "2.0.0"
description = "Optional pure-Python add-on for reading pre-v2 .dat parameter files into regpoly Generator / Transformation objects."
requires-python = ">=3.10"
license = "BSD-3-Clause"
authors = [{name = "Francois Panneton, Ph.D."}]
dependencies = [
    "regpoly",
    "regpoly-cpp",
]

[project.scripts]
regpoly-legacy = "regpoly_legacy.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
