id: harase-kimoto-2018
authors:
  - {family: Harase, given: Shin}
  - {family: Kimoto, given: Takamitsu}
year: 2018
title: "Implementing 64-bit Maximally Equidistributed F₂-Linear Generators with Mersenne Prime Period"
venue: ACM Transactions on Mathematical Software
volume: "44"
issue: "3"
pages: "Article 30, 11 pages"
doi: https://doi.org/10.1145/3159444
pdf: papers/melg-64-app.pdf
bibkey: HaraseKimoto2018
starred: true
tags: [MELG, 64bit, ME]

abstract: |
  CPUs and operating systems are moving from 32 to 64 bits, and
  hence it is important to have good pseudorandom number generators
  designed to fully exploit these word lengths. However, existing
  64-bit very long period generators based on linear recurrences
  modulo 2 are not completely optimized in terms of the
  equidistribution properties. Here we develop 64-bit maximally
  equidistributed pseudorandom number generators that are optimal in
  this respect and have speeds equivalent to 64-bit Mersenne
  Twisters. We provide a table of specific parameters with period
  lengths from 2^607 − 1 to 2^44497 − 1.

notes: |
  All seven generators use the MELG family's two-feedback state
  transition (Eqs. 7 and 8 of the paper) with parameters
  `(w, N, M, r, σ1, σ2, a)`, together with the linear output
  transformation of Eq. 12,
  `y = w[i] ⊕ (w[i] << σ3) ⊕ (w[i+L] & b)`, which is encoded here as
  a single `laggedTempering` step with parameters
  `(w, sigma=σ3, L, b)`.

