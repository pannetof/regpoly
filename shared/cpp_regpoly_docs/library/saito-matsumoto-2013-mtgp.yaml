abstract: |
  MTGP is a Mersenne-Twister variant whose state is partitioned across
  small "blocks" so that each step of the recurrence can be evaluated
  cooperatively by GPU threads. The construction preserves the
  Mersenne-prime period of standard MT while admitting parallel state
  updates suitable for GPU execution. Tabulated parametrisations cover
  block sizes from MEXP=11213 up to MEXP=216091.

notes: |
  Cross-check fixture: ``docs/library/mtgp_params.yaml`` — currently
  marked deferred because upstream MTToolBox does not ship a
  per-MEXP ``calc_equidist`` binary for MTGP, only an aggregate
  parameter-search tool.

