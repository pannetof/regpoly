id: lecuyer-1999
authors:
  - {family: "L'Ecuyer", given: Pierre}
year: 1999
title: "Tables of Maximally Equidistributed Combined LFSR Generators"
venue: Mathematics of Computation
volume: "68"
issue: "225"
pages: "261–269"
doi: https://www.jstor.org/stable/2585109
pdf: papers/tausme2.pdf
bibkey: LEcuyer1999
starred: true
tags: [LFSR, Tausworthe, ME, classic]

abstract: |
  We give the results of a computer search for maximally
  equidistributed combined linear feedback shift register (or
  Tausworthe) random number generators, whose components are
  trinomials of degrees slightly less than 32 or 64. These
  generators are fast and have good statistical properties.

notes: |
  All 222 generators proposed in Tables 1-7 of the paper.  The two
  canonical ones that the paper also provides as C implementations
  (Figures 1 and 2) are surfaced as the short ids `lfsr113` and
  `lfsr258`; every other entry is named
  `lecuyer1999-t<T>-r<N>` for Table T, row N.

generators:
  - id: lfsr113
    display: 'LFSR113'
    family: Tausworthe
    target: tested_generator
    combined: true
    Lmax: 32
    starred: true
    components:
      - family: Tausworthe
        L: 32
        params: {k: 31, nb_terms: 3, quicktaus: true, poly: [0, 6, 31], s: 18}
        tempering: []
      - family: Tausworthe
        L: 32
        params: {k: 29, nb_terms: 3, quicktaus: true, poly: [0, 2, 29], s: 2}
        tempering: []
      - family: Tausworthe
        L: 32
        params: {k: 28, nb_terms: 3, quicktaus: true, poly: [0, 13, 28], s: 7}
        tempering: []
      - family: Tausworthe
        L: 32
        params: {k: 25, nb_terms: 3, quicktaus: true, poly: [0, 3, 25], s: 13}
        tempering: []
    notes: |
      The canonical LFSR113 (Figure 1 of the paper,
      first ME-CF generator in Table 1).  Period $\approx 2^{113}$.

