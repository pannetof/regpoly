          - "Matsumoto & Nishimura 1998 — MT": papers/matsumoto-nishimura-1998.md
          - "MTToolBox RMT samples": papers/mttoolbox-rmt.md
          - "Nishimura 2000 — 64-bit MT": papers/nishimura-2000.md
          - "Saito 2009 — dSFMT": papers/saito-2009-dsfmt.md
          - "Saito & Matsumoto 2008 — SFMT": papers/saito-matsumoto-2008.md
          - "Saito & Matsumoto 2011 — TinyMT": papers/saito-matsumoto-2011-tinymt.md
          - "Saito & Matsumoto 2013 — MTGP": papers/saito-matsumoto-2013-mtgp.md
