      - About the catalog: library/about.md
  - Papers:
      - papers/index.md
      - About the bibliography: papers/about.md
      - "Catalog-backed (auto-generated)":
          - "Bhuvaneswari & Bhattacharjee 2026 — Cellular Automata": papers/bhuvaneswari-bhattacharjee-2026-cellular-automata.md
          - "Bhuvaneswari & Bhattacharjee 2026 — Equidistribution report": papers/cellular-automata-equidistribution-report.md
