# Three-service docker-compose stack: website + database + compute.
# Single command: `docker compose -f deploy/compose.yml up -d`.
#
# Migrations run in the web container's FastAPI lifespan (so /healthz
# only flips to 200 after the schema is current). The worker reaps
# orphan 'running' rows at its own startup (single-worker invariant
# means anything still 'running' at worker boot is from a dead
# predecessor and is safe to cancel). Compose's stop_grace_period on
# the worker plus its SIGTERM handler makes `docker compose pull &&
# up -d` correct without any external orchestration.

name: regpoly

services:
  db:
    image: postgres:${POSTGRES_TAG:-16.6-alpine}
    environment:
      POSTGRES_USER: regpoly
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: regpoly
    command:
      - postgres
      # Quiet down the chatty default; only log slow queries (>1s).
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=1000
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Publish 5432 to the host so a developer running `uv run regpoly-web`
    # against this stack can hit the DB directly (the web container reaches
    # it over the compose-internal bridge — this publish is solely for host
    # tooling and ad-hoc psql). Defaults to 127.0.0.1 to keep the DB off
    # the LAN; set DB_BIND_ADDR=0.0.0.0 in deploy/.env to expose it more
    # widely, but only do that on trusted networks since the stack never
    # adds TLS or pg_hba lockdown.
    ports:
      - "${DB_BIND_ADDR:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regpoly -d regpoly"]
      interval: 10s
      timeout: 3s
      retries: 5
      # First-run initdb takes ~15-25s on a slow disk; give it a grace
      # window so failed checks during initdb don't count toward retries.
      start_period: 30s
    restart: unless-stopped
    logging: &log_default
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  web:
    image: ghcr.io/pannetof/regpoly:${REGPOLY_TAG:-latest}
    command: >
      uvicorn regpoly_web.app:app
      --host 0.0.0.0 --port 8000 --workers 1
    environment:
      REGPOLY_WEB_DISABLE_INTERNAL_POOL: "1"
      REGPOLY_DB_URL: postgresql://regpoly:${DB_PASSWORD}@db:5432/regpoly
    ports:
      # Default 127.0.0.1 — host-local only. Set WEB_BIND_ADDR=0.0.0.0
      # in deploy/.env to expose on the host's LAN interface (e.g. so
      # a cloudflared on a different machine can reach it). The stack
      # never adds TLS or auth; whatever fronts it must.
      - "${WEB_BIND_ADDR:-127.0.0.1}:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Python instead of curl — the runtime image doesn't install curl.
      # /healthz returns 200 only after the lifespan completes, which
      # means migrations have been applied. The worker gates on this.
      test:
        - "CMD-SHELL"
        - 'python3 -c "import sys,urllib.request as u; sys.exit(0 if u.urlopen(\"http://localhost:8000/healthz\",timeout=3).status==200 else 1)"'
      interval: 30s
      timeout: 5s
      retries: 3
      # init_db on a fresh DB is fast (<5s); allow headroom for slow
      # disks or first-time emulated-arch boots.
      start_period: 60s
    restart: unless-stopped
    logging: *log_default

  worker:
    image: ghcr.io/pannetof/regpoly:${REGPOLY_TAG:-latest}
    command: python -m regpoly_web.worker
    environment:
      REGPOLY_WORKER: "1"
      REGPOLY_POOL_SIZE: "2"
      REGPOLY_ANALYSIS_POOL_SIZE: "1"
      REGPOLY_DB_URL: postgresql://regpoly:${DB_PASSWORD}@db:5432/regpoly
    # SIGTERM handler in worker.py marks in-flight rows cancelled and
    # drains the ProcessPoolExecutor. Compose's graceful stop sends
    # SIGTERM and waits up to stop_grace_period before SIGKILL — 75s
    # leaves 5s of slack over the 70s drain budget in worker.py.
    # Without this, `docker compose up -d` after an image bump would
    # SIGKILL the worker after the 10s default, leaving rows orphaned.
    stop_grace_period: 75s
    depends_on:
      # service_healthy on web means migrations have applied. If
      # migrations fail, web stays unhealthy and worker stays in
      # 'created' — the correct failure mode (refuse to write to an
      # unknown schema). depends_on only gates initial start, so a
      # later web flap will not stop a running worker.
      web:
        condition: service_healthy
    healthcheck:
      # Touchfile must be at most 30s old. Worker's _heartbeat task
      # touches it every 10s; 30s tolerates one missed beat.
      test:
        - "CMD-SHELL"
        - 'test -f /tmp/worker.alive && test $$(($$(date +%s) - $$(stat -c %Y /tmp/worker.alive))) -lt 30'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *log_default

# Named volume — Docker manages the host path; no `mkdir` needed,
# no UID-mismatch surprises. Inspect with `docker volume inspect
# regpoly_pgdata` to find where it lives if you want to snapshot it
# externally (backups are out of scope of this stack).
volumes:
  pgdata: {}
