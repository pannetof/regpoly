[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
regpoly-cpp    = { workspace = true }
regpoly        = { workspace = true }
regpoly-legacy = { workspace = true }

[dependency-groups]
docs = [
    # Sphinx orchestrator
    "sphinx>=8.0",
    # PyData Sphinx Theme — NumPy / SciPy / pandas visual language
    "pydata-sphinx-theme>=0.16",
    # MyST-Parser — read existing .md narrative pages as-is
    "myst-parser>=4.0",
    # MyST-NB — render notebooks with jupyter-cache (hash-based execution)
    "myst-nb>=1.1",
    "jupyter-cache>=1.0",
    # sphinx-design — card grids on the home page
    "sphinx-design>=0.6",
    # Tiny QoL extensions
    "sphinx-copybutton>=0.5",
    "sphinx-autodoc-typehints>=2.4",
    # URL redirects so old MkDocs URLs survive the cutover
    "sphinx-reredirects>=0.1",
    # C++ via Doxygen → Breathe → Exhale
    # (requires `doxygen` + `graphviz` on PATH at build time)
    "breathe>=4.35",
    "exhale>=0.3",
]
lint = [
    "ruff>=0.6",
    "import-linter>=2.0",
]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "nbmake>=1.5",
    # FastAPI TestClient (Phase 5.3+) — `from fastapi.testclient import
    # TestClient` requires httpx as the underlying transport.
    "httpx>=0.27",
    # BeautifulSoup for macro/template render tests (regpoly-web v2 redesign).
    "beautifulsoup4>=4.12",
    # Ephemeral Postgres per test session (dockerize plan Phase 1: PG
    # migration). pgserver vendors the PG binaries so the test suite
    # runs without requiring a system PG install or docker.
    "pgserver>=0.0.20",
    # Per-test timeout so a wedged subprocess test reports rather than
    # hangs the entire CI run (caught the ci-slow lane wedging without
    # this).
    "pytest-timeout>=2.3",
]
e2e = [
    "playwright>=1.45",
    "pytest-playwright>=0.5",
]
dev = [
    "numpy>=2.2.6",
    "pypdf>=6.11.0",
    "sympy>=1.14.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "third_party",
    "notebooks",
    "docs/notebooks",
]

# Baseline: enforce only pyflakes (undefined names, unused imports) and
# import sorting on the whole workspace. The `D` (pydocstyle) rules are
# scoped to the public-API surface via the per-file overrides below;
# applying them workspace-wide would warn on every internal helper.
[tool.ruff.lint]
select = ["F", "I"]
ignore = ["F401", "F841"]

# pydocstyle (D) rules on the public-API source dirs. Google convention
# (matches the [API doc style guide](../docs/dev/api-docs-style.md)).
# These rules are added incrementally as the docstring backfill lands —
# any module that's clean per pydocstyle can be removed from the
# `per-file-ignores` allow-list below.
[tool.ruff.lint.pydocstyle]
convention = "google"

# Scope the D rules to public Python source. Tests, scripts, and the
# pre-v2 web internals (routes/, tasks/) are kept out of the gate until
# their backfill catches up.
[tool.ruff.lint.per-file-ignores]
# Tests are exempt from D rules (test functions are self-documenting
# via their assertion patterns; docstrings would mostly be noise).
"packages/*/tests/**" = ["D"]
# Auto-generated reference modules.
"packages/regpoly/tests/*_mttoolbox_reference.py" = ["D"]
"packages/regpoly/src/regpoly/data/**" = ["D"]
# Web internals (route handlers, tasks workers, migrations) — internal,
# not user-facing API. Will be promoted from this exemption list as
# the backfill progresses.
"packages/regpoly-web/src/regpoly_web/routes/**" = ["D"]
"packages/regpoly-web/src/regpoly_web/tasks/**" = ["D"]
"packages/regpoly-web/src/regpoly_web/migrations/**" = ["D"]
# regpoly-cpp Python shim (just re-exports the .so).
"packages/regpoly-cpp/src/regpoly_cpp/**" = ["D"]
# Legacy reader internals — only LegacyReader / seek_from_legacy /
# parse_* / public CLI entry are documented. Private parsers are
# self-contained and would clutter the API ref.
"packages/regpoly-legacy/src/regpoly_legacy/cli.py" = ["D"]

# Workspace-wide opt-in to the D rules — add module globs here once
# their backfill is complete. The plan is to flip this from "explicit
# allow-list" to "enforce on every public module" once every src/
# tree under packages/ is documented.
[tool.ruff.lint.extend-per-file-ignores]
# Public API modules whose backfill is in progress — disable D
# until the per-module docstring sweep lands. Listed explicitly so
# the contributor can see what's left.
"packages/regpoly/src/regpoly/core/bitvect.py" = ["D"]
"packages/regpoly/src/regpoly/core/matrix.py" = ["D"]
"packages/regpoly/src/regpoly/core/component.py" = ["D"]
"packages/regpoly/src/regpoly/core/combination.py" = ["D"]
"packages/regpoly/src/regpoly/core/combination_build.py" = ["D"]
"packages/regpoly/src/regpoly/core/transformation.py" = ["D"]
"packages/regpoly/src/regpoly/core/parametric.py" = ["D"]
"packages/regpoly/src/regpoly/search/seek.py" = ["D"]
"packages/regpoly/src/regpoly/search/search_primitive.py" = ["D"]
"packages/regpoly/src/regpoly/search/tempering_search.py" = ["D"]
"packages/regpoly/src/regpoly/search/tempering_optimizer.py" = ["D"]
"packages/regpoly/src/regpoly/search/primitivity.py" = ["D"]
"packages/regpoly/src/regpoly/analyses/**" = ["D"]
"packages/regpoly/src/regpoly/io/**" = ["D"]
"packages/regpoly/src/regpoly/tools/**" = ["D"]
"packages/regpoly/src/regpoly/well.py" = ["D"]
"packages/regpoly/src/regpoly/__init__.py" = ["D"]
"packages/regpoly-legacy/src/regpoly_legacy/__init__.py" = ["D"]
"packages/regpoly-legacy/src/regpoly_legacy/well_legacy_decode.py" = ["D"]
"packages/regpoly-legacy/src/regpoly_legacy/tools/**" = ["D"]
# reader.py: public functions (parse_*) and LegacyReader are documented;
# the private `_parse_int`/`_parse_hex`/`_tokenise_*` helpers still
# carry pre-existing inline docstrings that don't match Google style.
# Removing this ignore is part of the long-tail backfill.
"packages/regpoly-legacy/src/regpoly_legacy/reader.py" = ["D"]
"packages/regpoly-web/src/regpoly_web/__init__.py" = ["D"]
"packages/regpoly-web/src/regpoly_web/app.py" = ["D"]
"packages/regpoly-web/src/regpoly_web/config.py" = ["D"]
"packages/regpoly-web/src/regpoly_web/database.py" = ["D"]
"packages/regpoly-web/src/regpoly_web/models.py" = ["D"]

[tool.pytest.ini_options]
markers = [
    "slow: long-running tests (MTToolBox cross-checks, nbmake notebooks)",
    "e2e: end-to-end browser tests via Playwright",
]
testpaths = [
    "packages/regpoly-cpp/tests/python",
    "packages/regpoly/tests",
    "packages/regpoly-web/tests",
    "packages/regpoly-legacy/tests/python",
]
addopts = "-m 'not slow and not e2e' --import-mode=importlib --timeout=120 --timeout-method=thread"

[tool.importlinter]
root_packages = ["regpoly_cpp", "regpoly", "regpoly_web", "regpoly_legacy"]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "Layers: regpoly_web > regpoly > regpoly_cpp (one-way only)"
type = "layers"
layers = ["regpoly_web", "regpoly", "regpoly_cpp"]

# regpoly_legacy is an optional add-on that sits *above* regpoly in the
# dependency graph (legacy → regpoly → regpoly_cpp). It's a sibling of
# regpoly_web on the consumer side, but the two never import each other.
[[tool.importlinter.contracts]]
name = "Layers: regpoly_legacy > regpoly > regpoly_cpp (one-way only)"
type = "layers"
layers = ["regpoly_legacy", "regpoly", "regpoly_cpp"]

# Phase 5 will tighten this further: web routes/workers must NOT import
# regpoly_cpp directly (only via regpoly). Captured here as a separate
# contract using `forbidden` with `allow_indirect_imports = true`.
[[tool.importlinter.contracts]]
name = "regpoly-web does not import regpoly_cpp directly (must go through regpoly)"
type = "forbidden"
source_modules = ["regpoly_web"]
forbidden_modules = ["regpoly_cpp", "_regpoly_cpp"]
allow_indirect_imports = true
