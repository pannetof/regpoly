[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
regpoly-cpp    = { workspace = true }
regpoly        = { workspace = true }
regpoly-legacy = { workspace = true }

[dependency-groups]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "pymdown-extensions>=10.7",
    "mkdocs-gen-files>=0.5",
    "mkdocs-jupyter>=0.25",
]
lint = [
    "ruff>=0.6",
    "import-linter>=2.0",
]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "nbmake>=1.5",
    # FastAPI TestClient (Phase 5.3+) — `from fastapi.testclient import
    # TestClient` requires httpx as the underlying transport.
    "httpx>=0.27",
    # BeautifulSoup for macro/template render tests (regpoly-web v2 redesign).
    "beautifulsoup4>=4.12",
    # Ephemeral Postgres per test session (dockerize plan Phase 1: PG
    # migration). pgserver vendors the PG binaries so the test suite
    # runs without requiring a system PG install or docker.
    "pgserver>=0.0.20",
    # Per-test timeout so a wedged subprocess test reports rather than
    # hangs the entire CI run (caught the ci-slow lane wedging without
    # this).
    "pytest-timeout>=2.3",
]
e2e = [
    "playwright>=1.45",
    "pytest-playwright>=0.5",
]
dev = [
    "numpy>=2.2.6",
    "pypdf>=6.11.0",
    "sympy>=1.14.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "third_party",
    "notebooks",
    "docs/notebooks",
]

# Phase 0 baseline: enforce only pyflakes (undefined names, unused imports)
# and import sorting. The full lint + format gate will be tightened in later
# phases as Python code gets rewritten as thin wrappers around regpoly_cpp.
[tool.ruff.lint]
select = ["F", "I"]
ignore = ["F401", "F841"]

[tool.pytest.ini_options]
markers = [
    "slow: long-running tests (MTToolBox cross-checks, nbmake notebooks)",
    "e2e: end-to-end browser tests via Playwright",
]
testpaths = [
    "packages/regpoly-cpp/tests/python",
    "packages/regpoly/tests",
    "packages/regpoly-web/tests",
    "packages/regpoly-legacy/tests/python",
]
addopts = "-m 'not slow and not e2e' --import-mode=importlib --timeout=120 --timeout-method=thread"

[tool.importlinter]
root_packages = ["regpoly_cpp", "regpoly", "regpoly_web", "regpoly_legacy"]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "Layers: regpoly_web > regpoly > regpoly_cpp (one-way only)"
type = "layers"
layers = ["regpoly_web", "regpoly", "regpoly_cpp"]

# regpoly_legacy is an optional add-on that sits *above* regpoly in the
# dependency graph (legacy → regpoly → regpoly_cpp). It's a sibling of
# regpoly_web on the consumer side, but the two never import each other.
[[tool.importlinter.contracts]]
name = "Layers: regpoly_legacy > regpoly > regpoly_cpp (one-way only)"
type = "layers"
layers = ["regpoly_legacy", "regpoly", "regpoly_cpp"]

# Phase 5 will tighten this further: web routes/workers must NOT import
# regpoly_cpp directly (only via regpoly). Captured here as a separate
# contract using `forbidden` with `allow_indirect_imports = true`.
[[tool.importlinter.contracts]]
name = "regpoly-web does not import regpoly_cpp directly (must go through regpoly)"
type = "forbidden"
source_modules = ["regpoly_web"]
forbidden_modules = ["regpoly_cpp", "_regpoly_cpp"]
allow_indirect_imports = true
